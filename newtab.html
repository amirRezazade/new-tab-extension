<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>New Tab</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="search-bar">
      <label for="searchInput" class="search-icon">
        <svg xmlns="http://www.w3.org/2000/svg" aria-label="Google" role="img" viewBox="0 0 512 512" width="24" height="24" fill="#000000">
          <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
          <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
          <g id="SVGRepo_iconCarrier">
            <rect width="512" height="512" rx="15%" fill="transparent"></rect>
            <path fill="#4285f4" d="M386 400c45-42 65-112 53-179H260v74h102c-4 24-18 44-38 57z"></path>
            <path fill="#34a853" d="M90 341a192 192 0 0 0 296 59l-62-48c-53 35-141 22-171-60z"></path>
            <path fill="#fbbc02" d="M153 292c-8-25-8-48 0-73l-63-49c-23 46-30 111 0 171z"></path>
            <path fill="#ea4335" d="M153 219c22-69 116-109 179-50l55-54c-78-75-230-72-297 55z"></path>
          </g>
        </svg>
      </label>
      <input type="text" placeholder="Search..." id="searchInput" />
    </div>
    <div class="clock-widget" id="clockWidget">
      <div class="clock-time" id="clockTime">00:00</div>
      <div class="clock-date" id="clockDate">Monday, Jan 1</div>
    </div>
    <div class="bookmarks-wrapper">
      <div class="tab-bar">
        <div class="tabs" id="tabsContainer">
          <button class="tab active" data-tab="home">
            Home
            <span class="tab-arrow">▾</span>
          </button>
        </div>
        <button class="add-tab-btn" id="addTabBtn">+</button>
      </div>
      <div class="tab-divider"></div>
      <div class="link-groups">
        <div class="group">
          <h3>Work</h3>
          <a href="https://notion.so" class="link-item">
            <img src="https://www.google.com/s2/favicons?domain=notion.so&sz=32" alt="" />
            Notion
          </a>
          <a href="https://figma.com" class="link-item">
            <img src="https://www.google.com/s2/favicons?domain=figma.com&sz=32" alt="" />
            Figma
          </a>
        </div>

        <div class="group">
          <h3>Reading</h3>
          <a href="https://news.ycombinator.com" class="link-item">
            <img src="https://www.google.com/s2/favicons?domain=news.ycombinator.com&sz=32" alt="" />
            Hacker News
          </a>
          <a href="https://medium.com" class="link-item">
            <img src="https://www.google.com/s2/favicons?domain=medium.com&sz=32" alt="" />
            Medium
          </a>
        </div>

        <div class="group">
          <h3>Personal</h3>
          <a href="https://gmail.com" class="link-item">
            <img src="https://www.google.com/s2/favicons?domain=gmail.com&sz=32" alt="" />
            Gmail
          </a>
          <a href="https://youtube.com" class="link-item">
            <img src="https://www.google.com/s2/favicons?domain=youtube.com&sz=32" alt="" />
            YouTube
          </a>
        </div>
      </div>
    </div>
    <button class="wallpaper-btn" id="wallpaperBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <circle cx="8.5" cy="8.5" r="1.5"></circle>
        <path d="M21 15l-5-5L5 21"></path>
      </svg>
    </button>
    <div class="wallpaper-panel" id="wallpaperPanel">
      <!-- تب‌های بالای پنل -->
      <div class="panel-tabs">
        <button class="panel-tab active" data-panel="wallpaper">Wallpaper</button>
        <button class="panel-tab" data-panel="theme">Theme</button>
      </div>

      <!-- محتوای Wallpaper (مثل قبل) -->
      <div class="panel-content" id="panelWallpaper">
        <div class="wallpaper-grid" id="wallpaperGrid"></div>
        <button class="upload-wallpaper-btn" id="uploadWallpaperBtn">Upload Wallpaper</button>
        <input type="file" id="wallpaperFileInput" accept="image/*" style="display: none" />
      </div>

      <!-- محتوای Theme -->
      <div class="panel-content" id="panelTheme" style="display: none">
        <!-- رنگ accent -->
        <p class="panel-label">Accent Color</p>
        <div class="color-presets" id="accentPresets"></div>

        <!-- رنگ متن -->
        <p class="panel-label">Text Color</p>
        <div class="color-presets" id="textPresets"></div>

        <!-- بلور کارت‌ها -->
        <p class="panel-label">Card Blur <span id="blurValue">12</span>px</p>
        <input type="range" id="blurRange" min="0" max="30" value="12" step="1" />

        <!-- شفافیت کارت‌ها -->
        <p class="panel-label">Card Opacity <span id="opacityValue">12</span>%</p>
        <input type="range" id="opacityRange" min="0" max="40" value="12" step="1" />
      </div>
    </div>

    <div class="fab-container" id="fabContainer">
      <!-- دکمه‌های منو (از پایین به بالا) -->
      <div class="fab-menu" id="fabMenu">
        <div class="fab-item">
          <span class="fab-label">Search Bookmarks</span>
          <button class="fab-btn" id="fabSearch">
            <svg xmlns="http://www.w3.org/2000/svg" width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </button>
        </div>

        <div class="fab-item">
          <span class="fab-label">Export Bookmarks</span>
          <button class="fab-btn" id="fabExport">
            <svg fill="#ffffff" width="22" height="22" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
              <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
              <g id="SVGRepo_iconCarrier"><path d="M8.71,7.71,11,5.41V15a1,1,0,0,0,2,0V5.41l2.29,2.3a1,1,0,0,0,1.42,0,1,1,0,0,0,0-1.42l-4-4a1,1,0,0,0-.33-.21,1,1,0,0,0-.76,0,1,1,0,0,0-.33.21l-4,4A1,1,0,1,0,8.71,7.71ZM21,14a1,1,0,0,0-1,1v4a1,1,0,0,1-1,1H5a1,1,0,0,1-1-1V15a1,1,0,0,0-2,0v4a3,3,0,0,0,3,3H19a3,3,0,0,0,3-3V15A1,1,0,0,0,21,14Z"></path></g>
            </svg>
          </button>
        </div>

        <div class="fab-item">
          <span class="fab-label">Import Bookmarks</span>
          <button class="fab-btn" id="fabImport">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
          </button>
        </div>

        <div class="fab-item">
          <span class="fab-label">Incognito</span>
          <button class="fab-btn" id="fabIncognito">
            <svg xmlns="http://www.w3.org/2000/svg" clip-rule="evenodd" fill-rule="evenodd" stroke-linejoin="round" stroke-miterlimit="2" viewBox="0 0 120 112" width="24" height="24" fill="currentColor">
              <g transform="translate(0 -4)">
                <path
                  d="m95 58.87v4.208h-70v-4.208zm-22.126-29.097.076.196 8.906 24.693h-43.712l8.867-24.693c.715-1.975 2.741-3.072 4.669-2.511l.192.061 8.128 2.858 8.089-2.858c1.919-.67 3.985.34 4.785 2.254zm4.626 37.341c7.506 0 13.611 6.409 13.611 14.288 0 7.878-6.105 14.286-13.611 14.286-7.117 0-12.872-5.755-13.494-13.062-3.772-2.531-6.845-.939-8.012-.082-.544 7.348-6.338 13.144-13.494 13.144-7.506 0-13.611-6.408-13.611-14.286 0-7.879 6.105-14.288 13.611-14.288 6.417 0 11.783 4.695 13.222 11.022 2.256-1.021 5.289-1.429 8.556.041 1.4-6.327 6.766-11.063 13.222-11.063zm0 4.082c-5.367 0-9.722 4.573-9.722 10.206s4.355 10.204 9.722 10.204 9.722-4.571 9.722-10.204-4.355-10.206-9.722-10.206zm-35 0c-5.367 0-9.722 4.573-9.722 10.206s4.355 10.204 9.722 10.204 9.722-4.571 9.722-10.204-4.355-10.206-9.722-10.206z"
                  transform="matrix(1.723077 0 0 1.637986 -43.384591 -40.736145)"
                ></path>
                <path d="m0 0h120v120h-120z" fill="none"></path>
              </g>
            </svg>
          </button>
        </div>

        <div class="fab-item">
          <span class="fab-label">Settings</span>
          <button class="fab-btn" id="fabSettings">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="24" height="24" fill="currentColor">
              <path
                d="M47.16,21.221l-5.91-0.966c-0.346-1.186-0.819-2.326-1.411-3.405l3.45-4.917c0.279-0.397,0.231-0.938-0.112-1.282 l-3.889-3.887c-0.347-0.346-0.893-0.391-1.291-0.104l-4.843,3.481c-1.089-0.602-2.239-1.08-3.432-1.427l-1.031-5.886 C28.607,2.35,28.192,2,27.706,2h-5.5c-0.49,0-0.908,0.355-0.987,0.839l-0.956,5.854c-1.2,0.345-2.352,0.818-3.437,1.412l-4.83-3.45 c-0.399-0.285-0.942-0.239-1.289,0.106L6.82,10.648c-0.343,0.343-0.391,0.883-0.112,1.28l3.399,4.863 c-0.605,1.095-1.087,2.254-1.438,3.46l-5.831,0.971c-0.482,0.08-0.836,0.498-0.836,0.986v5.5c0,0.485,0.348,0.9,0.825,0.985 l5.831,1.034c0.349,1.203,0.831,2.362,1.438,3.46l-3.441,4.813c-0.284,0.397-0.239,0.942,0.106,1.289l3.888,3.891 c0.343,0.343,0.884,0.391,1.281,0.112l4.87-3.411c1.093,0.601,2.248,1.078,3.445,1.424l0.976,5.861C21.3,47.647,21.717,48,22.206,48 h5.5c0.485,0,0.9-0.348,0.984-0.825l1.045-5.89c1.199-0.353,2.348-0.833,3.43-1.435l4.905,3.441 c0.398,0.281,0.938,0.232,1.282-0.111l3.888-3.891c0.346-0.347,0.391-0.894,0.104-1.292l-3.498-4.857 c0.593-1.08,1.064-2.222,1.407-3.408l5.918-1.039c0.479-0.084,0.827-0.5,0.827-0.985v-5.5C47.999,21.718,47.644,21.3,47.16,21.221z M25,32c-3.866,0-7-3.134-7-7c0-3.866,3.134-7,7-7s7,3.134,7,7C32,28.866,28.866,32,25,32z"
              ></path>
            </svg>
          </button>
        </div>
      </div>

      <!-- دکمه اصلی همبرگری -->
      <button class="fab-main" id="fabMain">
        <span class="fab-main-icon">☰</span>
      </button>
    </div>

    <div class="modal-overlay" id="searchOverlay">
      <div class="modal search-modal">
        <div class="search-input-wrapper">
          <span
            ><svg xmlns="http://www.w3.org/2000/svg" width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg
          ></span>
          <input type="text" id="searchLinksInput" placeholder="Search links..." />
        </div>
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>
    <div class="modal-overlay" id="settingsOverlay">
      <div class="modal settings-modal">
        <h3>Settings</h3>

        <div class="settings-group">
          <label class="settings-row">
            <span>Show Clock & Date</span>
            <input type="checkbox" id="settingClock" />
          </label>

          <label class="settings-row">
            <span>Show Search Bar</span>
            <input type="checkbox" id="settingSearch" />
          </label>

          <label class="settings-row">
            <span>Open links in new tab</span>
            <input type="checkbox" id="settingNewTab" />
          </label>
        </div>

        <div class="settings-group">
          <button class="settings-btn" id="settingExport">
            <span> Export Data </span>
            <svg fill="#ffffff" width="19" height="19" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
              <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
              <g id="SVGRepo_iconCarrier"><path d="M8.71,7.71,11,5.41V15a1,1,0,0,0,2,0V5.41l2.29,2.3a1,1,0,0,0,1.42,0,1,1,0,0,0,0-1.42l-4-4a1,1,0,0,0-.33-.21,1,1,0,0,0-.76,0,1,1,0,0,0-.33.21l-4,4A1,1,0,1,0,8.71,7.71ZM21,14a1,1,0,0,0-1,1v4a1,1,0,0,1-1,1H5a1,1,0,0,1-1-1V15a1,1,0,0,0-2,0v4a3,3,0,0,0,3,3H19a3,3,0,0,0,3-3V15A1,1,0,0,0,21,14Z"></path></g>
            </svg>
          </button>
          <button class="settings-btn" id="settingImport">
            <span> Import Data </span>
            <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
          </button>
          <input type="file" id="settingImportFile" accept=".json" style="display: none" />
        </div>

        <div class="modal-actions">
          <button type="button" id="settingsCloseBtn">Close</button>
        </div>
      </div>
    </div>
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <h3 id="modalTitle">Add Group</h3>
        <form id="modalForm">
          <div id="tabNameField">
            <label>
              Tab name
              <input type="text" id="tabNameInput" placeholder="e.g. Work" />
            </label>
          </div>

          <div id="groupNameField">
            <label>
              Group name
              <input type="text" id="groupNameInput" placeholder="e.g. Work" />
            </label>
          </div>

          <div id="linkFields">
            <label>
              Link name
              <input type="text" id="linkNameInput" placeholder="e.g. Notion" />
            </label>
            <label>
              URL
              <input type="text" id="linkUrlInput" placeholder="e.g. notion.so" />
            </label>
          </div>

          <div class="modal-actions">
            <button type="button" id="modalCancelBtn">Cancel</button>
            <button type="submit">Save</button>
          </div>
        </form>
      </div>
    </div>
    <div class="modal-overlay" id="editLinkOverlay">
      <div class="modal">
        <h3>Edit Link</h3>
        <form id="editLinkForm">
          <label>
            Name
            <input type="text" id="editLinkName" />
          </label>
          <label>
            URL
            <input type="text" id="editLinkUrl" />
          </label>
          <div class="modal-actions">
            <button type="button" id="editLinkCancelBtn">Cancel</button>
            <button type="submit">Save</button>
          </div>
        </form>
      </div>
    </div>
    <div class="modal-overlay" id="confirmModalOverlay">
      <div class="modal">
        <h3 id="confirmModalTitle">Title</h3>
        <p id="confirmModalMessage"></p>
        <form id="confirmModalForm">
          <label id="confirmModalInputWrapper">
            <input type="text" id="confirmModalInput" />
          </label>
          <div class="modal-actions">
            <button type="button" id="confirmModalCancelBtn">Cancel</button>
            <button type="submit" id="confirmModalSubmitBtn">Save</button>
          </div>
        </form>
      </div>
    </div>
    <script src="script.js" type="module"></script>
  </body>
</html>
